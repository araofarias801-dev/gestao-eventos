version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gestao_eventos_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestao_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao_eventos_backend
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gestao_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestao_eventos_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gestao_network

volumes:
  postgres_data:

networks:
  gestao_network:
    driver: bridge
