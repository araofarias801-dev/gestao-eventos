<div class="container">
  <div *ngIf="loading" class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="event && !loading">
    <mat-card-header>
      <mat-card-title>{{ event.title }}</mat-card-title>
      <mat-card-subtitle>{{ event.eventDate | date:'dd/MM/yyyy HH:mm' }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p><strong>Descrição:</strong> {{ event.description }}</p>
      <p><strong>Local:</strong> {{ event.location }}</p>
      <p><strong>Criado em:</strong> {{ event.createdAt | date:'dd/MM/yyyy HH:mm' }}</p>
      <p><strong>Atualizado em:</strong> {{ event.updatedAt | date:'dd/MM/yyyy HH:mm' }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button (click)="voltar()">
        <mat-icon>arrow_back</mat-icon> Voltar
      </button>
      <button mat-raised-button color="accent" (click)="editar()">
        <mat-icon>edit</mat-icon> Editar
      </button>
    </mat-card-actions>
  </mat-card>
</div>
